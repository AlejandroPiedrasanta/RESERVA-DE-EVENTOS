name: Build Windows .exe

# Compila el ejecutable de Windows (sin Python requerido) con PyInstaller
# y lo publica como asset del release. El backend consulta la Release
# latest para servir el .exe instantáneamente al usuario.
#
# Triggers:
#   · push de tag v*          → build + release automático
#   · workflow_dispatch       → build manual (crea/actualiza release "latest-exe")
on:
  push:
    tags:
      # Solo tags semánticos de 3 segmentos (vX.Y.Z). Evita que tags de 2
      # segmentos (v1.20) o basura (vOK12) disparen un build/release duplicado.
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag para la release (default: latest-exe)'
        required: false
        default: 'latest-exe'
      prerelease:
        description: '¿Publicar como prerelease? (true/false)'
        required: false
        default: 'false'
      app_version:
        description: 'Versión a embeber en los binarios (override de version.txt SOLO en el runner)'
        required: false
        default: ''
  workflow_call:
    inputs:
      release_tag:
        type: string
        required: false
        default: 'latest-exe'
      prerelease:
        type: string
        required: false
        default: 'true'
      ref:
        type: string
        required: false
        default: ''
      app_version:
        description: 'Versión a embeber en los binarios (override de version.txt SOLO en el runner, no toca main)'
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Override version.txt (runner-only, no touch main)
        shell: bash
        run: |
          if [ -n "${{ inputs.app_version }}" ]; then
            echo "${{ inputs.app_version }}" > version.txt
            echo "✓ version.txt (runner) = ${{ inputs.app_version }}"
          else
            echo "→ Sin override; usando version.txt del repo: $(cat version.txt 2>/dev/null || echo N/A)"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install backend deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # emergentintegrations is an Emergent-internal package (not on PyPI).
          # Strip it out for the Windows build — it's only used by the LLM
          # integration path which is not exercised in the .exe runtime.
          grep -v '^emergentintegrations' backend/requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt
          pip install "pyinstaller>=6.10,<7" pillow

      - name: Install & build frontend
        working-directory: frontend
        run: |
          yarn install --frozen-lockfile
          yarn build
        env:
          # El .exe sirve la UI localmente (mismo host) → apunta a localhost:8001
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001
          CI: false

      - name: Generate favicon.ico from logo.png
        shell: pwsh
        run: |
          # PyInstaller e Inno Setup requieren un .ico válido para --icon.
          # El repo sólo tiene logo.png, así que lo convertimos multi-tamaño.
          python -c "from PIL import Image; im=Image.open('frontend/public/logo.png').convert('RGBA'); w,h=im.size; s=max(w,h); c=Image.new('RGBA',(s,s),(0,0,0,0)); c.paste(im,((s-w)//2,(s-h)//2)); c.save('frontend/public/favicon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          if (-not (Test-Path "frontend/public/favicon.ico")) { throw "No se pudo generar favicon.ico" }
          Write-Host "✓ favicon.ico generado"

      - name: Prepare bundle payload
        shell: pwsh
        run: |
          # Copiar el build del frontend al lado del standalone_app para que PyInstaller lo empaquete
          if (-not (Test-Path frontend/build/index.html)) {
            throw "❌ frontend/build/index.html no existe. ¿Falló 'yarn build'?"
          }
          New-Item -ItemType Directory -Force -Path backend/_bundle | Out-Null
          # Copy-Item con /* copia el CONTENIDO, no la carpeta. Usamos rm previo + copia entera.
          if (Test-Path backend/_bundle/build) { Remove-Item -Recurse -Force backend/_bundle/build }
          Copy-Item -Recurse -Force frontend/build backend/_bundle/build
          if (-not (Test-Path backend/_bundle/build/index.html)) {
            throw "❌ backend/_bundle/build/index.html no existe tras la copia."
          }
          Write-Host "✓ Payload preparado. Contenido de backend/_bundle/build:"
          Get-ChildItem backend/_bundle/build | Select-Object -First 20 Name, Length
          # Copiar assets extra que espera el runtime (ai_context, versión, temas)
          if (Test-Path backend/ai_context_default.py) { Copy-Item backend/ai_context_default.py backend/_bundle/ }
          if (Test-Path version.txt) { Copy-Item version.txt backend/_bundle/ }
          if (Test-Path themes/saved_themes.json) {
            New-Item -ItemType Directory -Force -Path backend/_bundle/themes | Out-Null
            Copy-Item themes/saved_themes.json backend/_bundle/themes/
          }

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          $iconArg = @()
          if (Test-Path frontend/public/favicon.ico) {
            $iconArg = @("--icon", "frontend/public/favicon.ico")
            Write-Host "✓ Usando favicon.ico"
          } else {
            Write-Host "⚠ favicon.ico no existe — construyendo sin icono personalizado"
          }
          $pyiArgs = @(
            "--onefile",
            "--windowed",
            "--name", "CinemaProductions",
            "--add-data", "backend/_bundle/build;build",
            "--add-data", "backend/_bundle/ai_context_default.py;.",
            "--add-data", "backend/_bundle/version.txt;.",
            "--add-data", "backend/_bundle/themes;themes",
            "--hidden-import", "motor.motor_asyncio",
            "--hidden-import", "pymongo",
            "--hidden-import", "bson",
            "--hidden-import", "apscheduler.schedulers.asyncio",
            "--hidden-import", "apscheduler.triggers.cron",
            "--hidden-import", "apscheduler.triggers.interval",
            "--hidden-import", "pywebpush",
            "--hidden-import", "PIL",
            "--collect-submodules", "uvicorn",
            "--collect-submodules", "fastapi"
          ) + $iconArg + @("backend/standalone_app.py")
          pyinstaller @pyiArgs
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller falló con exit $LASTEXITCODE" }

      - name: Smoke test .exe (verify build/index.html is bundled + HTTP works)
        shell: pwsh
        run: |
          # Ejecutamos el .exe (con --windowed no muestra consola), esperamos que
          # arranque, y validamos: (a) _MEI*/build/index.html existe, (b) el
          # servidor responde en http://127.0.0.1:8001/api/ con 200.
          $exe = "dist/CinemaProductions.exe"
          if (-not (Test-Path $exe)) { throw "No hay .exe para smoke test" }
          $env:CP_NO_BROWSER = "1"
          $p = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 10  # más tiempo: uvicorn + init DB embebida

          # (a) MEI check
          $meiDirs = Get-ChildItem "$env:TEMP" -Directory -Filter "_MEI*" -ErrorAction SilentlyContinue |
                     Where-Object { Test-Path (Join-Path $_.FullName "build/index.html") }
          if (-not $meiDirs) {
            if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue }
            throw "❌ Smoke test (a): ningún _MEI* contiene build/index.html."
          }
          Write-Host "✓ (a) build/index.html empaquetado en $($meiDirs[0].FullName)"

          # (b) HTTP check con reintentos
          $ok = $false
          for ($i = 0; $i -lt 20; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8001/api/" -TimeoutSec 2 -UseBasicParsing
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch { }
            Start-Sleep -Milliseconds 500
          }
          if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue }
          if (-not $ok) { throw "❌ Smoke test (b): el .exe no respondió en http://127.0.0.1:8001/api/" }
          Write-Host "✓ (b) HTTP /api/ respondió 200 — arranque OK sin consola"

      - name: Firmar .exe (certificado auto-firmado, uso interno)
        shell: pwsh
        run: |
          # NOTA: firma AUTO-FIRMADA para uso interno. Windows SmartScreen seguirá
          # mostrando "editor desconocido" en equipos donde el certificado no esté
          # instalado como raíz de confianza — es el comportamiento esperado.
          Write-Host "→ Generando certificado de firma de código auto-firmado..."
          $pass = "CP-" + [System.Guid]::NewGuid().ToString("N").Substring(0,16)
          $cert = New-SelfSignedCertificate -Type CodeSigningCert `
            -Subject "CN=Cinema Productions, O=Cinema Productions" `
            -FriendlyName "Cinema Productions Code Signing" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyExportPolicy Exportable -KeyLength 2048 `
            -HashAlgorithm SHA256 -NotAfter (Get-Date).AddYears(5)
          $pfx = Join-Path $env:RUNNER_TEMP "cp_codesign.pfx"
          $sec = ConvertTo-SecureString -String $pass -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $pfx -Password $sec | Out-Null

          # Localizar signtool.exe del Windows SDK (elige la versión más reciente)
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
                      Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe no encontrado en el Windows SDK" }
          Write-Host "signtool: $signtool"

          # Compartir cert + signtool con el paso de firma del instalador
          "CP_PFX=$pfx"            | Out-File -Encoding ascii -Append $env:GITHUB_ENV
          "CP_PFX_PASS=$pass"      | Out-File -Encoding ascii -Append $env:GITHUB_ENV
          "CP_SIGNTOOL=$signtool"  | Out-File -Encoding ascii -Append $env:GITHUB_ENV

          # El smoke test arrancó el .exe; asegurar que ninguna instancia siga
          # bloqueando el archivo antes de firmar (evita "file is being used").
          Get-Process CinemaProductions -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 6

          # Firmar con reintentos por si el bootloader onefile tarda en liberar el archivo.
          $signed = $false
          for ($i = 1; $i -le 5; $i++) {
            & $signtool sign /f $pfx /p $pass /fd sha256 /tr http://timestamp.digicert.com /td sha256 "dist/CinemaProductions.exe"
            if ($LASTEXITCODE -eq 0) { $signed = $true; break }
            Write-Host "  intento $i falló (exit $LASTEXITCODE), reintentando en 5s..."
            Get-Process CinemaProductions -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 5
          }
          if (-not $signed) { throw "Firma del .exe falló tras varios intentos" }
          # verify /pa no encadena a una raíz de confianza en un auto-firmado; solo informativo.
          & $signtool verify /pa "dist/CinemaProductions.exe"
          Write-Host "✓ .exe firmado (auto-firmado + timestamp). verify exit=$LASTEXITCODE (self-signed: no encadena, esperado)"
          exit 0

      - name: Verify .exe & compute SHA256
        id: hash
        shell: pwsh
        run: |
          $exe = "dist/CinemaProductions.exe"
          if (-not (Test-Path $exe)) { throw "No se generó el .exe" }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "✓ .exe generado: $([math]::Round($size,2)) MB"

          # Calcular SHA256 y guardarlo como asset + outputs
          $sha = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLower()
          Write-Host "SHA256: $sha"
          "$sha  CinemaProductions.exe" | Out-File -Encoding ascii -NoNewline dist/CinemaProductions.exe.sha256
          "sha256=$sha" | Out-File -Encoding ascii -Append $env:GITHUB_OUTPUT
          "size_mb=$([math]::Round($size,2))" | Out-File -Encoding ascii -Append $env:GITHUB_OUTPUT

      # ── INSTALADOR (Inno Setup) ─────────────────────────────────────────
      # Envuelve el .exe portable en un instalador de Windows que:
      #   · Se instala en %LocalAppData%\CinemaProductions (sin permisos admin)
      #   · Crea acceso directo en Escritorio + menú Inicio
      #   · Auto-lanza la app al terminar la instalación
      #   · Registra un desinstalador en Aplicaciones y Características
      - name: Determine app version
        id: appver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          elif [ -f version.txt ]; then
            V=$(cat version.txt | tr -d '[:space:]')
          else
            V="1.0.0"
          fi
          # Inno Setup requiere formato X.Y[.Z[.W]] con cada segmento entre 0-65535.
          # Normalizamos: extraemos hasta 4 números, capamos cada uno a 65535 y
          # garantizamos al menos X.Y.Z (si venía "286811" → "65535.0.0").
          V_CLEAN=$(echo "$V" | awk -F. '
            {
              n = 0
              for (i = 1; i <= NF && n < 4; i++) {
                gsub(/[^0-9]/, "", $i)
                if ($i == "") continue
                v = $i + 0
                if (v > 65535) v = 65535
                out[n++] = v
              }
              while (n < 3) out[n++] = 0
              for (i = 0; i < n; i++) printf (i ? ".%s" : "%s"), out[i]
            }')
          [ -z "$V_CLEAN" ] && V_CLEAN="1.0.0"
          echo "Version normalizada: $V (raw) → $V_CLEAN (Inno-safe)"
          echo "version=$V_CLEAN" >> $GITHUB_OUTPUT

      - name: Write Inno Setup script
        shell: pwsh
        run: |
          # Copiar el .iss del repo a dist/ para que las rutas relativas apunten a dist/CinemaProductions.exe
          if (-not (Test-Path installer.iss)) { throw "No existe installer.iss en la raiz del repo" }
          Copy-Item installer.iss dist/installer.iss -Force
          # Copiar el MISMO ícono del .exe (favicon.ico generado desde logo.png)
          # para que el instalador use el mismo logo. Si faltara, generarlo aquí.
          if (-not (Test-Path frontend/public/favicon.ico)) {
            python -c "from PIL import Image; im=Image.open('frontend/public/logo.png').convert('RGBA'); w,h=im.size; s=max(w,h); c=Image.new('RGBA',(s,s),(0,0,0,0)); c.paste(im,((s-w)//2,(s-h)//2)); c.save('frontend/public/favicon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          }
          Copy-Item frontend/public/favicon.ico dist/favicon.ico -Force

          # Imágenes del wizard (BMPs). Están comiteadas en installer_assets/.
          # Fallback: regenerar desde logo.png si faltara alguna.
          if (-not (Test-Path installer_assets/wizard_big.bmp) -or -not (Test-Path installer_assets/wizard_small.bmp)) {
            Write-Host "⚠ Faltan BMPs en installer_assets/. Regenerando desde logo.png..."
            python scripts/gen_wizard_bmps.py frontend/public/logo.png installer_assets
          }
          Copy-Item installer_assets/wizard_big.bmp   dist/wizard_big.bmp   -Force
          Copy-Item installer_assets/wizard_small.bmp dist/wizard_small.bmp -Force
          Write-Host "✓ installer.iss + favicon.ico + wizard BMPs listos en dist/"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "Inno Setup no encontrado en $iscc" }
          & $iscc "/DMyAppVersion=${{ steps.appver.outputs.version }}" dist\installer.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup falló con exit $LASTEXITCODE" }

      - name: Firmar instalador (certificado auto-firmado, uso interno)
        shell: pwsh
        run: |
          # Reutiliza el certificado y signtool creados al firmar el .exe.
          & $env:CP_SIGNTOOL sign /f $env:CP_PFX /p $env:CP_PFX_PASS /fd sha256 /tr http://timestamp.digicert.com /td sha256 "dist/CinemaProductions-Setup.exe"
          if ($LASTEXITCODE -ne 0) { throw "Firma del instalador falló (exit $LASTEXITCODE)" }
          & $env:CP_SIGNTOOL verify /pa "dist/CinemaProductions-Setup.exe"
          Write-Host "✓ Instalador firmado (auto-firmado + timestamp). verify exit=$LASTEXITCODE (self-signed: esperado)"
          exit 0

      - name: Verify installer & compute SHA256
        id: hashsetup
        shell: pwsh
        run: |
          $setup = "dist/CinemaProductions-Setup.exe"
          if (-not (Test-Path $setup)) { throw "No se generó el instalador" }
          $size = (Get-Item $setup).Length / 1MB
          Write-Host "✓ Instalador generado: $([math]::Round($size,2)) MB"
          $sha = (Get-FileHash -Algorithm SHA256 $setup).Hash.ToLower()
          Write-Host "Setup SHA256: $sha"
          "$sha  CinemaProductions-Setup.exe" | Out-File -Encoding ascii -NoNewline dist/CinemaProductions-Setup.exe.sha256
          "sha256=$sha" | Out-File -Encoding ascii -Append $env:GITHUB_OUTPUT
          "size_mb=$([math]::Round($size,2))" | Out-File -Encoding ascii -Append $env:GITHUB_OUTPUT

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "name=Release ${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.release_tag || 'latest-exe' }}" >> $GITHUB_OUTPUT
            echo "name=Cinema Productions ${{ inputs.release_tag || 'latest-exe' }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ inputs.prerelease || 'true' }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: |
            dist/CinemaProductions.exe
            dist/CinemaProductions.exe.sha256
            dist/CinemaProductions-Setup.exe
            dist/CinemaProductions-Setup.exe.sha256
          body: |
            ## Cinema Productions — Windows

            Dos opciones de descarga, ambas sin necesidad de Python:

            ### 📥 Instalador (recomendado)
            **`CinemaProductions-Setup.exe`** — `${{ steps.hashsetup.outputs.size_mb }} MB`
            Doble clic → se instala en `%LocalAppData%\CinemaProductions`, crea accesos directos y lanza la app automáticamente. No requiere permisos de administrador.

            SHA256: `${{ steps.hashsetup.outputs.sha256 }}`

            ### 💾 Ejecutable portable
            **`CinemaProductions.exe`** — `${{ steps.hash.outputs.size_mb }} MB`
            Doble clic → arranca la app sin instalar nada. Ideal para USB o pruebas rápidas.

            SHA256: `${{ steps.hash.outputs.sha256 }}`

            ---
            ### Verificar integridad (Windows PowerShell)
            ```powershell
            Get-FileHash .\CinemaProductions-Setup.exe -Algorithm SHA256
            Get-FileHash .\CinemaProductions.exe       -Algorithm SHA256
            ```

            Si Windows SmartScreen te advierte: pulsa *Más información → Ejecutar de todos modos*.
            Compilado por GitHub Actions desde el commit `${{ github.sha }}`.
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────
  #  LINUX build (portable binary)
  # ────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Override version.txt (runner-only)
        run: |
          if [ -n "${{ inputs.app_version }}" ]; then
            echo "${{ inputs.app_version }}" > version.txt
            echo "✓ version.txt (runner) = ${{ inputs.app_version }}"
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          grep -v '^emergentintegrations' backend/requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt
          pip install "pyinstaller>=6.10,<7" pillow

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001
          CI: false
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Prepare bundle payload
        run: |
          mkdir -p backend/_bundle
          cp -r frontend/build backend/_bundle/build
          [ -f backend/ai_context_default.py ] && cp backend/ai_context_default.py backend/_bundle/
          [ -f version.txt ] && cp version.txt backend/_bundle/
          if [ -f themes/saved_themes.json ]; then
            mkdir -p backend/_bundle/themes
            cp themes/saved_themes.json backend/_bundle/themes/
          fi

      - name: Build binary with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name CinemaProductions-linux-x86_64 \
            --add-data "backend/_bundle/build:build" \
            --add-data "backend/_bundle/ai_context_default.py:." \
            --add-data "backend/_bundle/version.txt:." \
            --add-data "backend/_bundle/themes:themes" \
            --hidden-import motor.motor_asyncio \
            --hidden-import pymongo \
            --hidden-import bson \
            --hidden-import apscheduler.schedulers.asyncio \
            --hidden-import apscheduler.triggers.cron \
            --hidden-import apscheduler.triggers.interval \
            --hidden-import pywebpush \
            --hidden-import PIL \
            --collect-submodules uvicorn \
            --collect-submodules fastapi \
            backend/standalone_app.py

      - name: Compute SHA256
        id: hash
        run: |
          BIN="dist/CinemaProductions-linux-x86_64"
          [ -f "$BIN" ] || { echo "::error::binary no generado"; exit 1; }
          chmod +x "$BIN"
          SIZE=$(du -m "$BIN" | cut -f1)
          SHA=$(sha256sum "$BIN" | awk '{print $1}')
          echo "$SHA  CinemaProductions-linux-x86_64" > "$BIN.sha256"
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "size_mb=$SIZE" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.release_tag || 'latest-exe' }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ inputs.prerelease || 'true' }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: |
            dist/CinemaProductions-linux-x86_64
            dist/CinemaProductions-linux-x86_64.sha256
          append_body: true
          body: |

            ---
            ### 🐧 Linux (portable binary — x86_64)
            **`CinemaProductions-linux-x86_64`** — `${{ steps.hash.outputs.size_mb }} MB`
            ```bash
            chmod +x CinemaProductions-linux-x86_64
            ./CinemaProductions-linux-x86_64
            ```
            SHA256: `${{ steps.hash.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────
  #  macOS build (portable binary — Apple Silicon)
  #  Nota: sin firma ni notarización, Gatekeeper pedirá "Abrir de todos modos"
  #  desde Ajustes → Privacidad y Seguridad la primera vez.
  # ────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Override version.txt (runner-only)
        run: |
          if [ -n "${{ inputs.app_version }}" ]; then
            echo "${{ inputs.app_version }}" > version.txt
            echo "✓ version.txt (runner) = ${{ inputs.app_version }}"
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          grep -v '^emergentintegrations' backend/requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt
          pip install "pyinstaller>=6.10,<7" pillow

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001
          CI: false
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Prepare bundle payload
        run: |
          mkdir -p backend/_bundle
          cp -R frontend/build backend/_bundle/build
          [ -f backend/ai_context_default.py ] && cp backend/ai_context_default.py backend/_bundle/
          [ -f version.txt ] && cp version.txt backend/_bundle/
          if [ -f themes/saved_themes.json ]; then
            mkdir -p backend/_bundle/themes
            cp themes/saved_themes.json backend/_bundle/themes/
          fi

      - name: Generate .icns from logo.png
        run: |
          python -c "
          from PIL import Image
          import os
          im = Image.open('frontend/public/logo.png').convert('RGBA')
          os.makedirs('iconset.iconset', exist_ok=True)
          sizes = [16,32,64,128,256,512,1024]
          for s in sizes:
              im.resize((s,s), Image.LANCZOS).save(f'iconset.iconset/icon_{s}x{s}.png')
              if s < 1024:
                  im.resize((s*2,s*2), Image.LANCZOS).save(f'iconset.iconset/icon_{s}x{s}@2x.png')
          "
          iconutil -c icns iconset.iconset -o app.icns
          ls -la app.icns

      - name: Build binary with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name CinemaProductions-macos-arm64 \
            --icon app.icns \
            --add-data "backend/_bundle/build:build" \
            --add-data "backend/_bundle/ai_context_default.py:." \
            --add-data "backend/_bundle/version.txt:." \
            --add-data "backend/_bundle/themes:themes" \
            --hidden-import motor.motor_asyncio \
            --hidden-import pymongo \
            --hidden-import bson \
            --hidden-import apscheduler.schedulers.asyncio \
            --hidden-import apscheduler.triggers.cron \
            --hidden-import apscheduler.triggers.interval \
            --hidden-import pywebpush \
            --hidden-import PIL \
            --collect-submodules uvicorn \
            --collect-submodules fastapi \
            backend/standalone_app.py

      - name: Compute SHA256
        id: hash
        run: |
          BIN="dist/CinemaProductions-macos-arm64"
          [ -f "$BIN" ] || { echo "::error::binary no generado"; exit 1; }
          chmod +x "$BIN"
          SIZE=$(du -m "$BIN" | cut -f1)
          SHA=$(shasum -a 256 "$BIN" | awk '{print $1}')
          echo "$SHA  CinemaProductions-macos-arm64" > "$BIN.sha256"
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "size_mb=$SIZE" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.release_tag || 'latest-exe' }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ inputs.prerelease || 'true' }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: |
            dist/CinemaProductions-macos-arm64
            dist/CinemaProductions-macos-arm64.sha256
          append_body: true
          body: |

            ---
            ### 🍎 macOS (portable binary — Apple Silicon)
            **`CinemaProductions-macos-arm64`** — `${{ steps.hash.outputs.size_mb }} MB`
            ```bash
            chmod +x CinemaProductions-macos-arm64
            xattr -d com.apple.quarantine CinemaProductions-macos-arm64 2>/dev/null || true
            ./CinemaProductions-macos-arm64
            ```
            Sin firma/notarización: la primera vez, Gatekeeper puede bloquearlo. Ve a *Ajustes → Privacidad y Seguridad → Abrir de todos modos*.
            SHA256: `${{ steps.hash.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ────────────────────────────────────────────────────────────────────────
  #  LINUX ARM64 build (Raspberry Pi 4/5, AWS Graviton, ARM cloud VMs)
  # ────────────────────────────────────────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Override version.txt (runner-only)
        run: |
          if [ -n "${{ inputs.app_version }}" ]; then
            echo "${{ inputs.app_version }}" > version.txt
            echo "✓ version.txt (runner) = ${{ inputs.app_version }}"
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          grep -v '^emergentintegrations' backend/requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt
          pip install "pyinstaller>=6.10,<7" pillow

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001
          CI: false
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Prepare bundle payload
        run: |
          mkdir -p backend/_bundle
          cp -r frontend/build backend/_bundle/build
          [ -f backend/ai_context_default.py ] && cp backend/ai_context_default.py backend/_bundle/
          [ -f version.txt ] && cp version.txt backend/_bundle/
          if [ -f themes/saved_themes.json ]; then
            mkdir -p backend/_bundle/themes
            cp themes/saved_themes.json backend/_bundle/themes/
          fi

      - name: Build binary with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name CinemaProductions-linux-arm64 \
            --add-data "backend/_bundle/build:build" \
            --add-data "backend/_bundle/ai_context_default.py:." \
            --add-data "backend/_bundle/version.txt:." \
            --add-data "backend/_bundle/themes:themes" \
            --hidden-import motor.motor_asyncio \
            --hidden-import pymongo \
            --hidden-import bson \
            --hidden-import apscheduler.schedulers.asyncio \
            --hidden-import apscheduler.triggers.cron \
            --hidden-import apscheduler.triggers.interval \
            --hidden-import pywebpush \
            --hidden-import PIL \
            --collect-submodules uvicorn \
            --collect-submodules fastapi \
            backend/standalone_app.py

      - name: Compute SHA256
        id: hash
        run: |
          BIN="dist/CinemaProductions-linux-arm64"
          [ -f "$BIN" ] || { echo "::error::binary no generado"; exit 1; }
          chmod +x "$BIN"
          SIZE=$(du -m "$BIN" | cut -f1)
          SHA=$(sha256sum "$BIN" | awk '{print $1}')
          echo "$SHA  CinemaProductions-linux-arm64" > "$BIN.sha256"
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "size_mb=$SIZE" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.release_tag || 'latest-exe' }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ inputs.prerelease || 'true' }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: |
            dist/CinemaProductions-linux-arm64
            dist/CinemaProductions-linux-arm64.sha256
          append_body: true
          body: |

            ---
            ### 🐧 Linux (portable binary — ARM64 / aarch64)
            **`CinemaProductions-linux-arm64`** — `${{ steps.hash.outputs.size_mb }} MB`
            Para Raspberry Pi 4/5, AWS Graviton, ARM cloud VMs y otros sistemas ARM64.
            ```bash
            chmod +x CinemaProductions-linux-arm64
            ./CinemaProductions-linux-arm64
            ```
            SHA256: `${{ steps.hash.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
