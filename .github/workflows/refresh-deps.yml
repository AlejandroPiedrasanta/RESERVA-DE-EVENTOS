name: refresh-deps

# Regenera y publica los tarballs de dependencias en la release "deps-latest".
# El bootstrap.sh de una cuenta nueva descarga estos tarballs en vez de correr
# yarn/pip desde cero -> arranque en segundos.
#
# Mejoras clave para arranque veloz:
#   · PODA node_modules (node-prune + borrado de tests/docs/.map/.d.ts) -> tarball chico.
#   · Publica DOS formatos: .tar.zst (rapido) y .tar.gz (fallback universal).
#   · pip download resiliente (ignora paquetes internos de Emergent no publicos).

on:
  push:
    branches: [main]
    paths:
      - frontend/yarn.lock
      - frontend/package.json
      - backend/requirements.txt
      - .github/workflows/refresh-deps.yml
  workflow_dispatch:

permissions:
  contents: write

# Concurrency: solo UN refresh-deps corre a la vez.
# Bug previo: 2 dispatches paralelos ejecutaban `gh release delete/create` a la
# vez -> race condition, uno borraba el release mientras el otro subia assets,
# causando fallos 404/422 en los uploads. Con cancel-in-progress=true, si el
# usuario publica 2 veces seguidas, el segundo cancela al primero y usa la
# version mas reciente de deps.
concurrency:
  group: refresh-deps
  cancel-in-progress: true

jobs:
  build-and-publish:
    # Emergent pods run on aarch64 -> use ARM runner so pip wheels match.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pigz + zstd (compresores rapidos)
        run: sudo apt-get update -y && sudo apt-get install -y pigz zstd

      - name: yarn install (frozen)
        working-directory: frontend
        run: |
          npm i -g yarn@1.22.22
          yarn install --frozen-lockfile --network-timeout 600000

      - name: Podar node_modules (reduce tamano de descarga)
        working-directory: frontend
        run: |
          echo "→ Antes de podar: $(du -sh node_modules | cut -f1)"
          npx --yes node-prune node_modules || true
          find node_modules \( \
              -name "*.d.ts" -o -name "*.map" -o -name "*.markdown" -o \
              -name "AUTHORS" -o -name "CHANGELOG*" -o -name "HISTORY*" -o \
              -name "*.flow" -o -name "*.tsbuildinfo" \
            \) -type f -delete 2>/dev/null || true
          find node_modules -type d \( \
              -name "test" -o -name "tests" -o -name "__tests__" -o \
              -name "docs" -o -name "example" -o -name "examples" -o \
              -name ".github" \
            \) -exec rm -rf {} + 2>/dev/null || true
          echo "→ Despues de podar: $(du -sh node_modules | cut -f1)"

      - name: Build node_modules tarballs (zstd + gzip)
        run: |
          mkdir -p artifacts
          # gzip (fallback universal) con pigz (paralelo)
          tar --use-compress-program="pigz -6" -cf artifacts/node_modules.tar.gz -C frontend node_modules
          # zstd (rapido: descarga + descompresion) — nivel 19 multihilo
          tar --use-compress-program="zstd -19 -T0" -cf artifacts/node_modules.tar.zst -C frontend node_modules
          sha256sum frontend/yarn.lock | awk '{print $1}' > artifacts/node_modules.sha256
          # sha16 de package.json — usado por bootstrap.sh para validar tarball ANTES de descargar
          sha256sum frontend/package.json | cut -c1-16 > artifacts/node_modules.tar.gz.sha16
          echo "→ gzip: $(du -sh artifacts/node_modules.tar.gz | cut -f1) | zstd: $(du -sh artifacts/node_modules.tar.zst | cut -f1) | sha16: $(cat artifacts/node_modules.tar.gz.sha16)"

      - name: Download pip wheels (resiliente)
        run: |
          set +e
          mkdir -p /tmp/wheels artifacts
          # Quitar paquetes internos de Emergent que NO estan en PyPI:
          #   · emergentintegrations (paquete interno)
          #   · litellm @ URL privada
          grep -vE '^(emergentintegrations|litellm)([=<>@ ]|$)' backend/requirements.txt > /tmp/req.txt
          pip download --dest /tmp/wheels -r /tmp/req.txt || echo "⚠ algunas wheels no se pudieron bajar (no fatal)"
          # Asegurar que /tmp/wheels tiene al menos 1 archivo (dummy) para que
          # el tarball nunca quede vacio y evite 'HTTP 400: Bad Content-Length'.
          if [ -z "$(ls -A /tmp/wheels 2>/dev/null)" ]; then
            echo "⚠ /tmp/wheels vacio — creando placeholder"
            echo "no wheels downloaded on $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/wheels/README.txt
          fi
          # IMPORTANTE: sha256sum se ejecuta ANTES del cd, con paths absolutos.
          # Antes: se hacia despues del `cd /tmp`, el path relativo
          # 'backend/requirements.txt' no existia, sha256sum fallaba silente y
          # creaba pip-wheels.sha256 vacio -> 'HTTP 400: Bad Content-Length'.
          sha256sum "$GITHUB_WORKSPACE/backend/requirements.txt" | awk '{print $1}' > "$GITHUB_WORKSPACE/artifacts/pip-wheels.sha256"
          cd /tmp && tar --use-compress-program="pigz -6" -cf "$GITHUB_WORKSPACE/artifacts/pip-wheels.tar.gz" wheels
          # Validar tamanos minimos (evitar assets vacios que rompan la subida)
          echo "→ pip-wheels.tar.gz: $(du -h $GITHUB_WORKSPACE/artifacts/pip-wheels.tar.gz | cut -f1)"
          echo "→ pip-wheels.sha256: $(wc -c < $GITHUB_WORKSPACE/artifacts/pip-wheels.sha256) bytes ($(cat $GITHUB_WORKSPACE/artifacts/pip-wheels.sha256))"
          # Falla si sha256 quedo vacio (defensivo)
          [ -s "$GITHUB_WORKSPACE/artifacts/pip-wheels.sha256" ] || { echo "✗ ERROR: pip-wheels.sha256 vacio tras sha256sum"; exit 1; }

      - name: Recreate deps-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Validar que todos los artifacts existen y no estan vacios
          echo "→ Verificando artifacts:"
          for f in artifacts/node_modules.tar.zst artifacts/node_modules.tar.gz \
                   artifacts/node_modules.tar.gz.sha16 artifacts/node_modules.sha256 \
                   artifacts/pip-wheels.tar.gz artifacts/pip-wheels.sha256; do
            if [ ! -s "$f" ]; then
              echo "✗ ERROR: $f no existe o esta vacio"
              exit 1
            fi
            echo "  ✓ $f ($(du -h $f | cut -f1))"
          done

          # Borrar release + tag previo (si existe) y crear release VACIO
          gh release delete deps-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create deps-latest \
            --title deps-latest \
            --prerelease \
            --notes "Auto-refreshed by CI on $(date -u +%Y-%m-%dT%H:%M:%SZ) from commit ${{ github.sha }}. Podado + zstd/gzip. Target env: linux/aarch64, node 20, python 3.11."

          # Subir cada asset INDIVIDUALMENTE con retry (hasta 3 intentos).
          # Fix para "HTTP 400: Bad Content-Length" de la API de uploads de GitHub,
          # que ocasionalmente falla con archivos pequenos (.sha256, .sha16 ~65 bytes).
          upload_with_retry() {
            local file="$1"
            local name; name=$(basename "$file")
            for attempt in 1 2 3; do
              if gh release upload deps-latest "$file" --clobber 2>&1; then
                echo "  ✓ Subido: $name (intento $attempt)"
                return 0
              fi
              echo "  ⚠ Fallo subida de $name (intento $attempt/3), reintentando en 5s..."
              sleep 5
            done
            echo "✗ ERROR: No se pudo subir $name tras 3 intentos"
            return 1
          }

          echo "→ Subiendo assets:"
          upload_with_retry artifacts/node_modules.tar.zst
          upload_with_retry artifacts/node_modules.tar.gz
          upload_with_retry artifacts/node_modules.tar.gz.sha16
          upload_with_retry artifacts/node_modules.sha256
          upload_with_retry artifacts/pip-wheels.tar.gz
          upload_with_retry artifacts/pip-wheels.sha256
          echo "✅ Release deps-latest recreado con todos los assets"
